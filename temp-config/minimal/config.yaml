# config.yaml — StarSleep 预设配置 (minimal)
# 最小化 CLI 系统，适合服务器或无图形界面环境

meta:
  work_dir: /starsleep
  snapshot_dir: /starsleep/snapshots
  pkg_cache: /var/cache/pacman/pkg
  db_path: var/lib/pacman

layers:
  - base.yaml
  - tools.yaml
  - services.yaml

inherit:
  - /etc/passwd
  - /etc/shadow
  - /etc/group
  - /etc/localtime
  - /etc/locale.conf
  - /etc/locale.gen
  - /etc/pacman.d/mirrorlist
  - /etc/pacman.conf
  - /etc/hosts
  - /etc/ssh
